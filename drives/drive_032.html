<style>
* { box-sizing: border-box; }
:root {
  --bg: #1a1a1a; --bg-elev: #222; --bg-elev2: #2a2a2a;
  --border: #333; --text: #e8e8e8; --text-dim: #888;
  --accent: #8fd9c7; --highlight: #ffb547; --highlight-border: #ff8c00;
}
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; min-height: 100vh; }
.topbar { position: sticky; top: 0; z-index: 100; background: rgba(22,22,22,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 14px 28px; }
.topbar-inner { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
.crumb { display: flex; align-items: baseline; gap: 14px; font-family: 'Space Grotesk', sans-serif; flex-wrap: wrap; }
.crumb a { color: var(--text-dim); text-decoration: none; font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase; transition: color 0.2s; }
.crumb a:hover { color: var(--accent); }
.crumb .title { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: 0.01em; }
.stats { display: flex; gap: 18px; margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }
.stats b { color: var(--accent); font-weight: 600; }
.search-bar { display: flex; gap: 12px; padding: 12px 28px; background: var(--bg-elev); border-bottom: 1px solid var(--border); align-items: stretch; flex-wrap: wrap; }
.search-input-wrap { flex: 1; min-width: 280px; position: relative; }
#searchInput { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; padding: 10px 14px 10px 36px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
#searchInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(143,217,199,0.1); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); pointer-events: none; }
.clear-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 0 16px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.05em; transition: all 0.2s; }
.clear-btn:hover { border-color: var(--accent); color: var(--accent); }
.main-grid { display: grid; grid-template-columns: 1fr 300px; min-height: calc(100vh - 110px); }
.main-grid.no-panel { grid-template-columns: 1fr; }
.svg-container { overflow: auto; padding: 20px; background: radial-gradient(circle at 20% 30%, rgba(107,163,214,0.03) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(143,217,199,0.03) 0%, transparent 50%), var(--bg); }
#tree-svg { display: block; }
.node { cursor: pointer; transition: opacity 0.25s; }
.node:hover .node-rect { filter: brightness(1.1); }
.node.dimmed { opacity: 0.15; }
.node.highlight .node-rect { fill: var(--highlight) !important; stroke: var(--highlight-border) !important; stroke-width: 1.5 !important; }
.node.highlight .node-text { fill: #1a1a1a !important; font-weight: 700 !important; }
.node.jump-target .node-rect { stroke: var(--accent) !important; stroke-width: 2.5 !important; }
.conn.dimmed { opacity: 0.08 !important; }
.side-panel { background: var(--bg-elev); border-left: 1px solid var(--border); padding: 16px 18px; overflow-y: auto; max-height: calc(100vh - 110px); position: sticky; top: 110px; display: none; }
.side-panel.visible { display: block; }
.panel-title { font-family: 'Space Grotesk', sans-serif; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: baseline; }
.panel-title b { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 12px; }
#resultList { list-style: none; padding: 0; margin: 0; }
#resultList li { padding: 8px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; line-height: 1.4; margin-bottom: 3px; background: var(--bg-elev2); border-left: 2px solid transparent; transition: all 0.15s; word-break: break-all; }
#resultList li:hover { background: #333; border-left-color: var(--highlight); }
#resultList li .lvl-badge { display: inline-block; font-size: 9px; font-family: 'JetBrains Mono', monospace; color: var(--text-dim); background: rgba(255,255,255,0.05); padding: 1px 5px; border-radius: 2px; margin-right: 6px; letter-spacing: 0.05em; }
#resultList .no-hit { padding: 12px; text-align: center; color: var(--text-dim); font-size: 11px; font-style: italic; }
#tooltip { position: fixed; background: #0d0d0d; border: 1px solid var(--accent); border-radius: 4px; padding: 10px 14px; max-width: 320px; font-size: 11px; color: var(--text); z-index: 1000; pointer-events: none; box-shadow: 0 8px 32px rgba(0,0,0,0.6); display: none; font-family: 'JetBrains Mono', monospace; line-height: 1.5; }
#tooltip .tt-header { color: var(--accent); font-weight: 600; margin-bottom: 6px; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
#tooltip .tt-user { padding: 2px 0; }
#tooltip .tt-role { color: var(--text-dim); font-size: 10px; }
#tooltip .tt-empty { color: var(--text-dim); font-style: italic; }
@media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } .side-panel { position: static; max-height: 400px; border-left: none; border-top: 1px solid var(--border); } }
</style>

  <aside class="side-panel" id="sidePanel">
    <div class="panel-title">該当フォルダ <b id="resultCount">0</b></div>
    <div id="panelBody"></div>
  </aside>
</div>
<div id="tooltip"></div>
<script>
(function(){
  const svg = document.getElementById('tree-svg');
  const allNodes = Array.from(svg.querySelectorAll('.node'));
  const allConns = Array.from(svg.querySelectorAll('.conn'));
  const searchInput = document.getElementById('searchInput');
  const panelBody = document.getElementById('panelBody');
  const resultCount = document.getElementById('resultCount');
  const sidePanel = document.getElementById('sidePanel');
  const mainGrid = document.getElementById('mainGrid');
  const tooltip = document.getElementById('tooltip');
  const svgContainer = document.getElementById('svgContainer');
  
  allNodes.forEach(n => {
    const rect = n.querySelector('.node-rect');
    const text = n.querySelector('.node-text');
    [rect, text].forEach(el => {
      if (!el) return;
      el.addEventListener('click', (e) => {
        if (e.target.closest('.info-icon')) return;
        const url = n.dataset.url;
        if (url) window.open(url, '_blank');
      });
    });
    const info = n.querySelector('.info-icon');
    if (info) {
      info.addEventListener('mouseenter', (e) => showTip(e, n));
      info.addEventListener('mousemove', (e) => positionTip(e));
      info.addEventListener('mouseleave', () => hideTip());
    }
  });
  
  function showTip(e, node) {
    const name = node.dataset.name;
    let users;
    try { users = JSON.parse(node.dataset.users); } catch(_) { users = []; }
    let h = `<div class="tt-header">${escapeHtml(name)}</div>`;
    if (users.length === 0) { h += '<div class="tt-empty">権限情報なし</div>'; }
    else { users.forEach(u => { h += `<div class="tt-user">${escapeHtml(u.email)} <span class="tt-role">${u.role ? '('+escapeHtml(u.role)+')' : ''}</span></div>`; }); }
    tooltip.innerHTML = h;
    tooltip.style.display = 'block';
    positionTip(e);
  }
  function positionTip(e) {
    const pad = 14;
    let x = e.clientX + pad, y = e.clientY + pad;
    const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
    if (x + tw > window.innerWidth) x = e.clientX - tw - pad;
    if (y + th > window.innerHeight) y = e.clientY - th - pad;
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  }
  function hideTip() { tooltip.style.display = 'none'; }
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
  
  let searchTimer = null;
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(doSearch, 150);
  });
  
  function doSearch() {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) { clearHighlight(); return; }
    const matched = [];
    allNodes.forEach(n => {
      const emails = (n.dataset.emails || '').toLowerCase();
      const emailList = emails.split(',').filter(Boolean);
      let hit = false;
      for (const e of emailList) { if (e === q || e.includes(q)) { hit = true; break; } }
      if (hit) { n.classList.add('highlight'); n.classList.remove('dimmed'); matched.push(n); }
      else { n.classList.remove('highlight'); n.classList.add('dimmed'); }
    });
    allConns.forEach(c => c.classList.add('dimmed'));
    
    // 結果が0件でもパネルは表示する（マッチ0もメッセージで示す）
    sidePanel.classList.add('visible');
    mainGrid.classList.remove('no-panel');
    
    if (matched.length === 0) {
      resultCount.textContent = '0';
      panelBody.innerHTML = '<div class="no-hit" style="padding:12px; text-align:center; color:var(--text-dim); font-size:11px; font-style:italic">該当するフォルダはこのページ内にありません</div>';
    } else {
      resultCount.textContent = matched.length;
      const ul = document.createElement('ul');
      ul.id = 'resultList';
      matched.forEach((n) => {
        const li = document.createElement('li');
        const name = n.dataset.name;
        const lvl = (n.getAttribute('class').match(/node-l(\d)/) || [])[1] || '?';
        li.innerHTML = `<span class="lvl-badge">L${lvl}</span>${escapeHtml(name)}`;
        li.addEventListener('click', () => jumpTo(n));
        ul.appendChild(li);
      });
      panelBody.innerHTML = '';
      panelBody.appendChild(ul);
    }
  }
  
  function clearHighlight() {
    allNodes.forEach(n => { n.classList.remove('highlight','dimmed','jump-target'); });
    allConns.forEach(c => c.classList.remove('dimmed'));
    // パネルを初期状態（非表示）に戻す
    sidePanel.classList.remove('visible');
    mainGrid.classList.add('no-panel');
    resultCount.textContent = '0';
    panelBody.innerHTML = '';
  }
  
  // 初期状態: パネル非表示
  clearHighlight();
  
  window.clearSearch = function() {
    searchInput.value = '';
    clearHighlight();
    searchInput.focus();
  };
  
  function jumpTo(node) {
    const rect = node.querySelector('.node-rect');
    const x = parseFloat(rect.getAttribute('x'));
    const y = parseFloat(rect.getAttribute('y'));
    const w = parseFloat(rect.getAttribute('width'));
    const containerRect = svgContainer.getBoundingClientRect();
    svgContainer.scrollTo({ left: x - containerRect.width/2 + w/2, top: y - containerRect.height/2, behavior: 'smooth' });
    allNodes.forEach(n => n.classList.remove('jump-target'));
    node.classList.add('jump-target');
    setTimeout(() => node.classList.remove('jump-target'), 2000);
  }
  
  // URLパラメータから自動検索
  try {
    const params = new URLSearchParams(window.location.search);
    const email = params.get('email');
    if (email) { searchInput.value = email; doSearch(); }
  } catch(_) {}
})();
</script>
